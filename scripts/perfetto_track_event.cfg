# trace-bench: Perfetto consumer config for the Pharos/system topology.
#
# Enables capture of the bench's TrackEvent "bench" category. Use it to drive
# an EXTERNAL consumer against the `traced` daemon, while bench_perfetto runs
# producer-only (--perfetto-backend system). The bench's own RUSAGE then
# reflects only the application's producer cost -- the serialize/drain work is
# paid here, in the `perfetto` consumer process, not in the app.
#
#   perfetto -c scripts/perfetto_track_event.cfg --txt -o trace_out
#
# Runs until stopped (Ctrl-C, or `trigger_perfetto stop_tracing`), so one
# session can span many bench runs. Ring buffer: overwrites old data, which is
# fine -- we measure overhead in the bench, not from the captured file.

buffers {
  size_kb: 262144
  fill_policy: RING_BUFFER
}
data_sources {
  config {
    name: "track_event"
    track_event_config {
      enabled_categories: "*"
    }
  }
}
